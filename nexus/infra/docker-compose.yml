# NEXUS local dev stack — Sporting Lagos FC
# Usage: docker compose -f infra/docker-compose.yml up -d
#
# Firecrawl uses the cloud API (api.firecrawl.dev) — no local service needed.
#
# Services:
#   api    → FastAPI backend  (http://localhost:8000)
#   redis  → Celery job queue (localhost:6379)

services:

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    restart: on-failure

  # ── Redis (Celery job queue) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: on-failure

networks:
  default:
    name: cil-dev
