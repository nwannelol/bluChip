# NEXUS — Railway deployment config for the FastAPI backend
#
# Firecrawl uses the cloud API (api.firecrawl.dev).
# Set FIRECRAWL_KEY in the Railway environment variables.

[build]
builder = "nixpacks"

[deploy]
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
restartPolicyMaxRetries = 3

[service]
rootDirectory = "backend"
